<!DOCTYPE html>
<html>
<head>
    <title>Contact Form - Hutton Tax Solutions</title>
    <style>
        body { display: none; }
    </style>
</head>
<body>
    <!-- Static form for Netlify build detection -->
    <form name="hutton-contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="hutton-contact" />
        <input type="hidden" name="bot-field" />
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
